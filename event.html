<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NethraCount - Event</title>

<!-- Style -->
<link rel="stylesheet" href="style.css">

<!-- Manifest PWA -->
<link rel="manifest" href="manifest.json">

<!-- Favicon multi-tailles -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/favicon-180x180.png">

<!-- Thème couleur navigateur -->
<meta name="theme-color" content="#e0b000">
</head>

<body>

<h1 id="eventTitle">🕸️ Event</h1>

<!-- Section pour ajouter un compteur -->
<div id="addCounterSection">
    <input id="newCounterName" placeholder="Nom du compteur" aria-label="Nom du compteur">
    <button onclick="addCounterFromInput()" aria-label="Ajouter compteur">Ajouter</button>
</div>

<!-- Conteneur des compteurs -->
<div id="counters"></div>

<!-- Export et sauvegarde -->
<div id="actions">
    <button onclick="exportResults()" aria-label="Exporter les résultats">Exporter</button>
    <button onclick="saveModel()" aria-label="Sauvegarder modèle">Sauvegarder modèle</button>
</div>

<script src="app.js"></script>

<!-- Librairie SortableJS pour drag & drop -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
// Initialisation du drag & drop
document.addEventListener("DOMContentLoaded", () => {
    let countersContainer = document.getElementById("counters");

    new Sortable(countersContainer, {
        animation: 200,
        ghostClass: 'dragging',
        onEnd: () => {
            // Reclasser les compteurs après déplacement
            let eventIndex = localStorage.getItem("currentEvent");
            let newOrder = Array.from(countersContainer.children).map(c => {
                let index = c.dataset.index;
                return events[eventIndex].counters[index];
            });
            events[eventIndex].counters = newOrder;
            localStorage.setItem("events", JSON.stringify(events));
            renderCounters();
        }
    });
});

// Animation lumineuse + tri par score auto
function increment(i) {
    let eventIndex = localStorage.getItem("currentEvent");
    events[eventIndex].counters[i].value++;

    // Animation glow sur le bouton +
    let counterDiv = document.getElementById(`counter-${i}`);
    let plusBtn = counterDiv.querySelector(".plus");
    plusBtn.classList.add("flash-glow");
    setTimeout(() => plusBtn.classList.remove("flash-glow"), 300);

    // Tri automatique par score décroissant
    events[eventIndex].counters.sort((a,b) => b.value - a.value);

    localStorage.setItem("events", JSON.stringify(events));
    renderCounters();
}
</script>

</body>
</html>
